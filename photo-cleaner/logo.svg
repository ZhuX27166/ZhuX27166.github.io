<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B280FF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)"/>
  <!-- Elegant vector photo frame icon -->
  <g fill="none" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" transform="translate(40, 40) scale(0.85)">
    <!-- Photo border -->
    <rect x="50" y="50" width="340" height="340" rx="30"/>
    <!-- Sun -->
    <circle cx="150" cy="150" r="30" fill="#FFFFFF" stroke="none"/>
    <!-- Hills/Mountains -->
    <path d="M54 340l100-110 90 90 80-90 62 70" fill="none"/>
  </g>
</svg>
